name: publish-mcp-registry

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: read

jobs:
  publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MCP publisher
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          archive="mcp-publisher_linux_amd64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/${archive}" \
            --output "${archive}"
          echo "${MCP_PUBLISHER_SHA256}  ${archive}" | sha256sum --check
          tar --extract --gzip --file "${archive}" mcp-publisher

      - name: Pin published image digest
        env:
          IMAGE: ghcr.io/ivo-toby/postgram:main
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE}" --format '{{.Manifest.Digest}}')"
          test -n "${digest}"
          jq --arg identifier "ghcr.io/ivo-toby/postgram@${digest}" \
            '.packages[0].identifier = $identifier' \
            server.json > server.publish.json

      - name: Validate registry metadata
        run: ./mcp-publisher validate server.publish.json

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish server.publish.json
