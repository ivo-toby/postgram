name: release-cli

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only one release at a time
concurrency:
  group: release-cli
  cancel-in-progress: false

permissions:
  contents: write          # tag, push CHANGELOG
  issues: write            # semantic-release commenting
  pull-requests: write
  id-token: write          # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # Node 24 ships with npm 11.x out of the box, which is what npm's
      # trusted publishing (OIDC) needs (>= 11.5.1). Using 24 here instead
      # of 22 avoids the `npm install -g npm@latest` self-upgrade path,
      # which historically fails on Node 22 runners with MODULE_NOT_FOUND
      # on promise-retry. The project's engines field (>=22) is
      # unaffected; this choice only pins the publishing runtime.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      # Install workspace deps (root + cli via workspaces).
      - name: Install
        run: npm ci

      - name: Lint CLI
        working-directory: cli
        run: npm run lint

      - name: Build CLI
        working-directory: cli
        run: npm run build

      - name: Test CLI
        working-directory: cli
        run: npm test

      - name: Semantic release
        working-directory: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No NPM_TOKEN — @semantic-release/npm calls `npm publish`, which
          # picks up OIDC credentials from GITHUB_ACTIONS when the package
          # has a trusted publisher configured on npmjs.com.
          NPM_CONFIG_PROVENANCE: "true"
        run: npx semantic-release
