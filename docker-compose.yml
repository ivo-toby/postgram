services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: postgram
      POSTGRES_USER: postgram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgram']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  mcp-server:
    image: postgram-mcp-server:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgram:${POSTGRES_PASSWORD}@postgres:5432/postgram
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: ${PORT:-3100}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://ollama:11434}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EXTRACTION_ENABLED: ${EXTRACTION_ENABLED:-false}
      EXTRACTION_MEMORY_MODE: ${EXTRACTION_MEMORY_MODE:-embed_only}
      EXTRACTION_PROVIDER: ${EXTRACTION_PROVIDER:-openai}
      EXTRACTION_MODEL: ${EXTRACTION_MODEL:-}
      EXTRACTION_BASE_URL: ${EXTRACTION_BASE_URL:-}
      EXTRACTION_API_KEY: ${EXTRACTION_API_KEY:-}
      OAUTH_ENABLED: ${OAUTH_ENABLED:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
    ports:
      - '0.0.0.0:3101:3100'
    restart: unless-stopped

  postgram-ui:
    image: postgram-postgram-ui:latest
    ports:
      - '${UI_BIND_HOST:-0.0.0.0}:${UI_PORT:-3102}:80'
    depends_on:
      - mcp-server
    restart: unless-stopped

volumes:
  pgdata:
  ollama_data:
