services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: postgram
      POSTGRES_USER: postgram
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgram']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mcp-server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgram:${POSTGRES_PASSWORD}@postgres:5432/postgram
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      PORT: ${PORT:-3100}
    ports:
      # Defaults to loopback-only on the host (safest). To expose on the LAN
      # for reachability from other machines, set PORT_BIND_HOST=0.0.0.0 in
      # your .env. Prefer running behind a reverse proxy (Caddy) with TLS for
      # anything beyond a trusted homelab.
      - '${PORT_BIND_HOST:-127.0.0.1}:${PORT:-3100}:3100'
    restart: unless-stopped

volumes:
  pgdata:
